# Publishes the package to PyPI using trusted publishing (OIDC), so no
# API token is stored in the repo. See docs/settings on PyPI:
# publisher = Nibblex/django-field-logger, workflow = publish.yml,
# environment = pypi.

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      # Fails the run before publishing if the tag does not match the
      # version in pyproject.toml (PyPI rejects mismatches anyway, but
      # this gives a clearer error).
      - name: Check tag matches project version
        if: github.event_name == 'release'
        run: |
          version=$(ls dist/*.tar.gz | sed -E 's/.*-([0-9][^-]*)\.tar\.gz/\1/')
          tag=${GITHUB_REF_NAME#v}
          if [ "$version" != "$tag" ]; then
            echo "Tag $GITHUB_REF_NAME does not match version $version" >&2
            exit 1
          fi

      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/project/django-field-logger/

    permissions:
      id-token: write # required for trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
